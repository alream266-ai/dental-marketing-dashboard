# System libraries required by headless Chromium (used by the SEO audit's
# rendered-DOM mode). Declared explicitly via apt rather than relying on
# `playwright install --with-deps`, which is unreliable on Nixpacks images.
[phases.setup]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libdbus-1-3", "libatspi2.0-0", "libxcomposite1", "libxdamage1",
  "libxfixes3", "libxrandr2", "libgbm1", "libxkbcommon0", "libpango-1.0-0",
  "libcairo2", "libasound2", "libxext6", "libx11-6", "libxcb1"
]
